<!-- Crypto Wallets -->
<div class="flex items-baseline justify-between px-1 mt-6">

</div>

<script>
  const API_URL = window.location.origin;
const token = localStorage.getItem("token");
let deleteId = null;
// ================= LOAD METHODS =================
async function loadMethods() {
  try {
    if (!token) return;

    const res = await fetch(`${API_URL}/api/withdraw-wallet`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    console.log("PAYMENT METHODS:", data);

    renderMethods(data);

  } catch (err) {
    console.error("LOAD METHODS ERROR:", err);
  }
}

// ================= RENDER =================
function renderMethods(wallets) {

  const bankContainer = document.getElementById("bankList");
  const cryptoContainer = document.getElementById("cryptoList");

  bankContainer.innerHTML = "";
  cryptoContainer.innerHTML = "";

  wallets.forEach(w => {

    // ================= BANK =================
    if (w.network === "BANK") {

      bankContainer.innerHTML += `
        <div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/20 flex items-center justify-between">
          
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-surface-container-low rounded-lg flex items-center justify-center">
              <span class="material-symbols-outlined text-primary text-3xl">account_balance</span>
            </div>

            <div>
              <h3 class="font-bold text-primary">${w.bankName}</h3>
              <p class="text-sm">${w.accountName}</p>
              <p class="text-xs">•••• •••• ${w.accountNumber?.slice(-4)}</p>
            </div>
          </div>

          <div class="flex gap-2">
            <button onclick="deleteWallet('${w._id}')"
              class="p-2 hover:text-red-500">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>

        </div>
      `;
    }

    // ================= CRYPTO =================
    else {

      cryptoContainer.innerHTML += `
        <div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/20 flex items-center justify-between">
          
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-surface-container-low rounded-lg flex items-center justify-center">
              <span class="material-symbols-outlined text-yellow-400 text-3xl">currency_bitcoin</span>
            </div>

            <div>
              <h3 class="font-bold text-primary">${w.network}</h3>
              <p class="text-xs">${w.address?.slice(0,12)}...</p>
            </div>
          </div>

          <div class="flex gap-2">
            <button onclick="deleteWallet('${w._id}')"
              class="p-2 hover:text-red-500">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>

        </div>
      `;
    }

  });
}

// ================= DELETE =================
function deleteWallet(id) {
  deleteId = id; // จำ id
  document.getElementById("deleteModal").classList.remove("hidden"); // เปิด modal
}

async function confirmDelete() {
  try {

    await fetch(`${API_URL}/api/withdraw-wallet/${deleteId}`, {
      method: "DELETE",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    // ปิด modal
    document.getElementById("deleteModal").classList.add("hidden");

    // โหลดใหม่
    loadMethods();

    // 🔥 แสดงสีเขียว
    const toast = document.getElementById("deleteToast");
    toast.classList.remove("hidden");

    setTimeout(() => {
      toast.classList.add("hidden");
    }, 2000);

  } catch (err) {
    console.error("DELETE ERROR:", err);
  }
}

function closeDeleteModal() {
  document.getElementById("deleteModal").classList.add("hidden");
}


// ================= BACK =================
function goBack() {
  window.location.href = "profile.html";
}

// INIT
document.addEventListener("DOMContentLoaded", loadMethods);
</script>


<!-- 🔥 DELETE CONFIRM MODAL -->
<div id="deleteModal"
class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">

  <div class="bg-white w-[90%] max-w-sm rounded-2xl p-6 text-center">

    <h2 class="text-lg font-bold mb-2">ยืนยันการลบ</h2>
    <p class="text-gray-500 text-sm mb-6">คุณต้องการลบข้อมูลนี้หรือไม่?</p>

    <div class="flex gap-3">
      <button onclick="confirmDelete()"
        class="flex-1 py-2 bg-red-500 text-white rounded-lg font-bold">
        ลบ
      </button>

      <button onclick="closeDeleteModal()"
        class="flex-1 py-2 bg-gray-200 rounded-lg">
        ยกเลิก
      </button>
    </div>

  </div>
</div>

<!-- ✅ SUCCESS TOAST -->
<div id="deleteToast"
class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl z-50 shadow-lg">
  ลบสำเร็จ
</div>
