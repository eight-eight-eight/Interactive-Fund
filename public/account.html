<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#91d78a",
                    "primary-fixed-dim": "#b3c5ff",
                    "surface-tint": "#435b9f",
                    "surface-container-highest": "#e1e3e4",
                    "surface": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "surface-container": "#f8fafc",
                    "secondary": "#D4AF37", /* Gold */
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#0c5216",
                    "on-surface-variant": "#64748b",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#241a00",
                    "on-secondary-fixed-variant": "#574500",
                    "tertiary": "#001902",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#002203",
                    "on-tertiary-container": "#5b9e58",
                    "background": "#ffffff",
                    "primary-fixed": "#dbe1ff",
                    "on-error-container": "#93000a",
                    "outline": "#e2e8f0",
                    "secondary-fixed-dim": "#e9c349",
                    "tertiary-container": "#003006",
                    "surface-container-high": "#f1f5f9",
                    "secondary-container": "#fed65b",
                    "on-primary-fixed-variant": "#2a4386",
                    "tertiary-fixed": "#acf4a4",
                    "on-primary-fixed": "#00174a",
                    "primary": "#002366", /* Deep Blue */
                    "surface-variant": "#f1f5f9",
                    "primary-container": "#e0e7ff",
                    "on-surface": "#002366", /* Deep Blue */
                    "on-error": "#ffffff",
                    "outline-variant": "#cbd5e1",
                    "on-background": "#002366",
                    "surface-dim": "#f1f5f9",
                    "surface-container-low": "#f8fafc",
                    "inverse-on-surface": "#f0f1f2",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#ffffff",
                    "on-primary-container": "#002366",
                    "inverse-primary": "#b3c5ff",
                    "on-secondary-container": "#745c00",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#ffe088",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
<div class="flex items-center justify-between px-6 h-16 w-full">
<button onclick="window.history.back()">
  <span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold tracking-widest text-secondary uppercase">เพิ่มข้อมูลการถอนเงิน</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Editorial Header Section -->
<div class="mb-10 ml-2">
<p class="text-on-surface-variant text-sm tracking-[0.2em] uppercase mb-2 font-semibold">Security Tier: Private</p>
<h2 class="font-headline text-3xl font-extrabold tracking-tight text-primary">Secure Assets Transfer</h2>
<div class="w-12 h-1 bg-secondary mt-4 rounded-full"></div>
</div>
<form class="space-y-8">
<!-- Beneficiary Name Input -->
<div id="beneficiaryBlock" class="space-y-3">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase ml-1">
                    ชื่อผู้รับผลประโยชน์
                </label>
<div class="relative group">
<input class="w-full h-16 bg-surface-container-high border-2 border-transparent rounded-xl px-5 text-on-surface placeholder:text-slate-400 focus:bg-white focus:border-secondary/40 focus:ring-0 transition-all outline-none" placeholder="Enter legal name" type="text"/>
</div>
</div>
<!-- Wallet Address Input -->
<div id="walletBlock" class="space-y-3">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase ml-1">
                    ที่อยู่กระเป๋าเงิน
                </label>
<div class="relative group">
<input class="w-full h-16 bg-surface-container-high border-2 border-transparent rounded-xl pl-5 pr-14 text-on-surface placeholder:text-slate-400 focus:bg-white focus:border-secondary/40 focus:ring-0 transition-all outline-none font-mono text-sm" placeholder="0x... or ENS domain" type="text"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-amber-600 transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'opsz' 32;">qr_code_scanner</span>
</button>
</div>
</div>

<!-- 🔥 BANK FORM -->
<div id="bankForm" class="space-y-4 hidden">

<label class="block text-xs font-bold uppercase text-on-surface-variant">
ชื่อธนาคาร
</label>
<input id="bankName"
class="w-full h-14 bg-surface-container-high border rounded-xl px-4"
placeholder="Enter bank name"/>

<label class="block text-xs font-bold uppercase text-on-surface-variant">
หมายเลขบัญชี
</label>
<input id="accountNumber"
class="w-full h-14 bg-surface-container-high border rounded-xl px-4"
placeholder="Enter account number"/>

<label class="block text-xs font-bold uppercase text-on-surface-variant">
ชื่อบัญชี
</label>
<input id="accountName"
class="w-full h-14 bg-surface-container-high border rounded-xl px-4"
placeholder="Enter account name"/>

</div>
<!-- Network Selection -->
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase ml-1">
                    การเลือกเครือข่าย
                </label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<!-- Selected State -->
<button onclick="selectNetwork(this)" class="network-btn flex flex-col items-center justify-center gap-2 h-24 rounded-xl bg-white border-2 border-secondary ring-4 ring-secondary/5 transition-all shadow-md shadow-secondary/10" type="button">
<span class="font-bold text-sm tracking-widest">ERC20</span>
<span class="text-[10px] uppercase">Ethereum</span>
</button>
<button onclick="selectNetwork(this)" class="network-btn flex flex-col items-center justify-center gap-2 h-24 rounded-xl bg-white border-2 border-secondary ring-4 ring-secondary/5 transition-all shadow-md shadow-secondary/10" type="button">
<span class="font-bold text-sm tracking-widest">BEP20</span>
<span class="text-[10px] uppercase">BSC</span>
</button>
<button onclick="selectNetwork(this)" class="network-btn flex flex-col items-center justify-center gap-2 h-24 rounded-xl bg-white border-2 border-secondary ring-4 ring-secondary/5 transition-all shadow-md shadow-secondary/10" type="button">
<span class="font-bold text-sm tracking-widest">TRC20</span>
<span class="text-[10px] uppercase">Tron</span>
</button>
<button onclick="selectNetwork(this)" class="network-btn flex flex-col items-center justify-center gap-2 h-24 rounded-xl bg-surface-container-high border-2 border-transparent" type="button">
<span class="font-bold text-sm tracking-widest">BANK</span>
<span class="text-[10px] uppercase">Fiat</span>
</button>
</div>
</div>
<!-- Warning Card -->
<div class="mt-8 p-5 rounded-xl bg-amber-50 border border-amber-200 flex gap-4">
<span class="material-symbols-outlined text-amber-600 shrink-0">info</span>
<p class="text-xs leading-relaxed text-amber-900/80 font-medium">
                    Ensure the destination address supports the selected network. Assets sent to the wrong network or incompatible address cannot be recovered.
                </p>
</div>
<!-- Action Buttons -->
<div class="pt-8 space-y-4">
<button onclick="saveWallet()" type="button"
  class="w-full h-16 bg-primary text-white rounded-xl font-bold text-lg">
  SAVE & CONTINUE
</button>
<button class="w-full py-4 text-slate-400 hover:text-primary font-bold text-xs tracking-[0.2em] uppercase transition-colors active:scale-95" type="button">
                    Cancel
                </button>
</div>
</form>
</main>
<!-- Visual Polish: Subtle Background Shapes -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-blue-500/5 blur-[100px] rounded-full pointer-events-none"></div>

<script>
  const API_URL = window.location.origin;
function selectNetwork(btn) {

  document.querySelectorAll(".network-btn").forEach(b => {
    b.classList.remove("border-secondary","ring-4","ring-secondary/5");
  });

  btn.classList.add("border-secondary","ring-4","ring-secondary/5");

  const selected = btn.innerText;

  const bankForm = document.getElementById("bankForm");
  const beneficiaryBlock = document.getElementById("beneficiaryBlock");
  const walletBlock = document.getElementById("walletBlock");

  if (selected.includes("BANK")) {

    // 🔥 แสดง BANK
    bankForm.classList.remove("hidden");

    // ❌ ซ่อน CRYPTO
    beneficiaryBlock.classList.add("hidden");
    walletBlock.classList.add("hidden");

  } else {

    // 🔥 แสดง CRYPTO
    bankForm.classList.add("hidden");

    beneficiaryBlock.classList.remove("hidden");
    walletBlock.classList.remove("hidden");
  }
}

async function saveWallet() {

  const token = localStorage.getItem("token");

  // 🔍 เช็คเลือก network
  const selectedBtn = document.querySelector(".network-btn.border-secondary");
  if (!selectedBtn) {
    alert("Please select network");
    return;
  }

  const network = selectedBtn.innerText.trim();

  let payload = {};

  // ================= BANK =================
  if (network.includes("BANK")) {

    const bankName = document.getElementById("bankName").value;
    const accountNumber = document.getElementById("accountNumber").value;
    const accountName = document.getElementById("accountName").value;

    if (!bankName || !accountNumber || !accountName) {
      alert("Please fill all bank fields");
      return;
    }

    payload = {
      network: "BANK",
      bankName,
      accountNumber,
      accountName
    };

  }

  // ================= CRYPTO =================
  else {

    const address = document.querySelector("#walletBlock input").value;

    if (!address) {
      alert("Enter wallet address");
      return;
    }

    payload = {
      network,
      address
    };
  }

  try {

    await fetch(`${API_URL}/api/withdraw-wallet/add`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    Authorization: "Bearer " + token
  },
  body: JSON.stringify(payload)
});

// ✅ ใช้ alert ใหม่
showSuccess("บันทึกข้อมูลสำเร็จ");


  } catch (err) {
    console.error(err);
    alert("Error saving");
  }
}


function showSuccess(msg) {
  const toast = document.getElementById("toastSuccess");
  const text = document.getElementById("toastText");

  text.innerText = msg;

  toast.classList.remove("hidden", "opacity-0");
  toast.classList.add("opacity-100");

  setTimeout(() => {
    toast.classList.remove("opacity-100");
    toast.classList.add("opacity-0");

    setTimeout(() => {
      toast.classList.add("hidden");
      window.location.href = "wallet-methods.html";
    }, 300);

  }, 2000);
}
</script>


<!-- ✅ TOAST SUCCESS -->
<div id="toastSuccess"
  class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-50 transition-all duration-300">

  <div class="bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg font-semibold text-sm">
    <span id="toastText">สำเร็จ</span>
  </div>

</div>
</body></html>
