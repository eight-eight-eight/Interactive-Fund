<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>รายละเอียดออเดอร์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Prompt', sans-serif;
    }
  </style>
</head>
<body class="bg-[#0B1324] min-h-screen flex items-start justify-center p-6">
  <div class="w-full max-w-md">
    <header class="flex items-center space-x-3 mb-6">
      <button onclick="goBack()" class="text-white text-3xl">
  <i class="fas fa-arrow-left"></i>
</button>
      <div class="flex items-center space-x-3">
        <div class="w-12 h-12 rounded-full bg-[#0B1324] flex items-center justify-center">
          <img id="logo" class="w-10 h-10 rounded-full" />
        </div>
        <div>
          <h1 class="text-white text-xl font-semibold leading-none" id="assetName">สินทรัพย์</h1>
          <p class="text-gray-500 text-sm -mt-1">ไบนารี</p>
        </div>
      </div>
    </header>

    <section class="bg-[#15202B] rounded-2xl p-6 text-gray-400">
      <div class="flex justify-between mb-4">
        <div>
          <p class="text-sm mb-1">การลงทุน</p>
          <p class="text-white text-2xl font-semibold" id="amount">$0.00</p>
        </div>
        <div class="text-right">
          <p class="text-sm mb-1">รีเทิร์น</p>
          <p class="text-2xl font-semibold" id="profit">$0.00 <span class="text-lg font-semibold" id="percent">+0%</span></p>
        </div>
      </div>

      <div class="mb-4">
        <p class="text-sm mb-1">ประเภทสถานะ</p>
        <p class="text-white text-lg font-semibold flex items-center space-x-1" id="direction">
          <span>ไม่ทราบ</span>
        </p>
      </div>

      <div class="grid grid-cols-2 gap-y-4 text-base">
        <div><p class="mb-1 text-sm">เวลาเปิด</p><p id="openedAt">-</p></div>
        <div><p class="mb-1 text-sm">ราคาเปิด</p><p id="entryPrice">-</p></div>
        <div><p class="mb-1 text-sm">เวลาหมดอายุ</p><p id="expireAt">-</p></div>
        <div><p class="mb-1 text-sm">ราคาปิด</p><p id="exitPrice">-</p></div>
        <div><p class="mb-1 text-sm">เวลาปิด</p><p id="closedAt">-</p></div>
        <div><p class="mb-1 text-sm">วิธีการปิด</p><p>หมดอายุแล้ว</p></div>
      </div>
    </section>
  </div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("orderId");
const token = localStorage.getItem("token");

if (!token || !orderId) {
  alert("กรุณาเข้าสู่ระบบหรือไม่พบออเดอร์");
  location.href = "/login.html";
}

// 🔥 helper
function formatDate(date){
  if(!date) return "-";
  return new Date(date).toLocaleString("th-TH");
}

function getLogo(symbol){
  const map = {
      "BINANCE:BTCUSDT": "images/assets/btc.png",
  "BINANCE:ETHUSDT": "images/assets/eth.png",
  "BINANCE:BNBUSDT": "images/assets/bnb.png",
  "BINANCE:SOLUSDT": "images/assets/sol.png",
  "BINANCE:XRPUSDT": "images/assets/xrp.png",
  "BINANCE:ADAUSDT": "images/assets/ada.png",   
  "BINANCE:DOGEUSDT": "images/assets/doge.png",
  "BINANCE:AVAXUSDT": "images/assets/avax.png", 
  "BINANCE:DOTUSDT": "images/assets/dot.png",  
  "BINANCE:LINKUSDT": "images/assets/link.png", 

  "NASDAQ:AAPL": "images/assets/aapl.png",
  "NASDAQ:MSFT": "images/assets/msft.png", 
  "NASDAQ:TSLA": "images/assets/tsla.png",
  "NASDAQ:NVDA": "images/assets/nvda.png",
  "NASDAQ:AMZN": "images/assets/amzn.png",

  "NASDAQ:AMD": "images/assets/amd.png",
"NASDAQ:META": "images/assets/meta.png",
"NASDAQ:NFLX": "images/assets/nflx.png",
"NASDAQ:GOOGL": "images/assets/google.png",

"NYSE:JPM": "images/assets/jpm.png",
"NYSE:KO": "images/assets/ko.png",
"NYSE:DIS": "images/assets/dis.png",

"NYSE:SPY": "images/assets/spy.png",
"NASDAQ:QQQ": "images/assets/qqq.png",
"NYSE:THD": "images/assets/thd.png",

"C:XAGUSD": "images/assets/silver.png",

  "C:XAUUSD": "images/assets/gold.png"
  };
  return map[symbol] || "images/assets/btc.png";
}

fetch(`/api/trade/order/${orderId}`, {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(order => {

    order.userId = localStorage.getItem("userId");

  if (!order || !order.symbol) {
    throw new Error("ข้อมูลออเดอร์ไม่ถูกต้อง");
  }

  const symbol = order.symbol;
  const amount = order.amount || 0;

  // 🔥 logo + name
  document.getElementById("logo").src = getLogo(symbol);

  document.getElementById("assetName").textContent =
  symbol.split(":")[1];

  // 💰 amount
  document.getElementById("amount").textContent =
    `$${amount.toFixed(2)}`;

  // 📈 percent
  document.getElementById("percent").textContent =
    `+${order.percent || 0}%`;

  // 🔼🔽 direction
  document.getElementById("direction").innerHTML =
    order.type === "BUY"
      ? `<span>ขึ้น</span><span class="text-green-500 ml-1">▲</span>`
      : `<span>ลง</span><span class="text-red-500 ml-1">▼</span>`;

  // 💹 PRICE
  document.getElementById("entryPrice").textContent =
    order.openPrice ? order.openPrice.toFixed(4) : "-";

  document.getElementById("exitPrice").textContent =
    order.closePrice ? order.closePrice.toFixed(4) : "-";

  // ⏱ TIME
  document.getElementById("openedAt").textContent =
    formatDate(order.openTime);

  const expire = order.openTime
    ? new Date(new Date(order.openTime).getTime() + (order.duration * 60000))
    : null;

  document.getElementById("expireAt").textContent =
    formatDate(expire);

  document.getElementById("closedAt").textContent =
    formatDate(order.closeTime);

  // ===============================
  // 🔥 REALTIME PROFIT SIMULATION
  // ===============================

function startProfitSimulation(order){

  const profitEl = document.getElementById("profit");

  // 🔥 ถ้าปิดแล้ว → ใช้ค่าจริง
  if(order.status === "closed"){

    let finalProfit = 0;

    if(order.result === "win"){
      finalProfit = order.amount * (order.percent / 100);
    }else{
      finalProfit = -(order.amount * (order.percent / 100));
    }

    profitEl.textContent =
      `${finalProfit >= 0 ? "+" : "-"}$${Math.abs(finalProfit).toFixed(2)}`;

    profitEl.className =
      `text-2xl font-semibold ${
        finalProfit >= 0 ? "text-green-500" : "text-red-500"
      }`;

    return;
  }

  // ===============================
  // 🔥 ใช้ระบบเดียวกับ trade.html
  // ===============================

  let forceResult = "lose";

  // 🔥 ดึงค่า win/lose จาก backend
  fetch(`/api/admin/get-trade-setting?userId=${order.userId}&symbol=${order.symbol.split(":")[1]}`,{
    headers:{
      Authorization:"Bearer " + localStorage.getItem("token")
    }
  })
  .then(res=>res.json())
  .then(data=>{
    forceResult = data.forceResult;
  })
  .catch(()=>{});

  let profit = 0;

  const maxProfit = order.amount * (order.percent / 100);
  const maxLoss = order.amount * (order.percent / 100);

  const startTime = new Date(order.openTime).getTime();
  const total = order.duration * 60;

  const interval = setInterval(()=>{

    const now = Date.now();
    const timePassed = Math.floor((now - startTime) / 1000);
    const timeLeft = total - timePassed;

    // 🎲 random movement
    const change = Math.random() * order.amount * 0.04;

    let direction;

    if(forceResult === "win"){
      direction = Math.random() > 0.4 ? 1 : -1;
    }else{
      direction = Math.random() > 0.6 ? 1 : -1;
    }

    profit += direction * change;

    // 🔒 clamp
    if(profit > maxProfit) profit = maxProfit - Math.random()*2;
    if(profit < -maxLoss) profit = -maxLoss + Math.random()*1;

    // 🔥 LOCK RESULT (สำคัญมาก)
    if(timeLeft <= 2){
      if(forceResult === "win"){
        profit = Math.abs(profit);
      }else{
        profit = -Math.abs(profit);
      }
    }

    // 🎨 update UI
    profitEl.textContent =
      `${profit >= 0 ? "+" : "-"}$${Math.abs(profit).toFixed(2)}`;

    profitEl.className =
      `text-2xl font-semibold ${
        profit >= 0 ? "text-green-500" : "text-red-500"
      }`;

    // ⛔ จบ
    if(timeLeft <= 0){
      clearInterval(interval);
    }

  },500);
}

  // 🔥 เรียกใช้
  startProfitSimulation(order);

})
.catch(err => {
  console.error("โหลดข้อมูลออเดอร์ผิดพลาด:", err);
  alert("ไม่พบข้อมูลออเดอร์");
});

function goBack(){

  // 🔥 ถ้ามี history → ย้อนปกติ
  if(document.referrer && document.referrer.includes("trade.html")){
    window.location.href = "/trade.html";
  }else{
    // 🔥 fallback กันพัง
    window.location.href = "/trade.html";
  }

}
</script>
</body>
</html>
