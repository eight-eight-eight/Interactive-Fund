<script>
  const socket = io();
  const API_URL = window.location.origin;

  const token = localStorage.getItem("token");

if (!token) {
  alert("Access denied");
  window.location.href = "login.html";
}

async function checkAdmin() {
  try {
    const res = await fetch("/api/user/profile", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const user = await res.json();

    if (user.role !== "admin") {
      alert("Admin only");
      window.location.href = "profile.html";
    }

  } catch (err) {
    alert("Access error");
    window.location.href = "login.html";
  }
}

checkAdmin();
// ================= GET USER ID =================
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

if (!userId) {
  alert("User ID not found");
  window.location.href = "admin-user-management.html";
}

let isLoadingDeposits = false;
let isLoadingWithdraws = false;
let depositCache = new Set();
let withdrawCache = new Set();


// ================= LOAD USER =================
async function loadUser() {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/admin/users/${userId}`, {
  headers: { Authorization: "Bearer " + token }
});

if (!res.ok) throw new Error("โหลด user ไม่สำเร็จ");

const user = await res.json();

    document.querySelector("h2").innerText = user.email;
    document.querySelector("p.text-on-surface-variant").innerText =
  "Vault ID: " + (user.vaultId || "-");
    document.querySelector("h3").innerText = "$" + (user.balance || 0);

    document.querySelectorAll(".bg-surface-container-high span:last-child")[0].innerText = user.role;

    if (user.createdAt) {
      const date = new Date(user.createdAt).toLocaleDateString();
      document.querySelectorAll(".bg-surface-container-high span:last-child")[1].innerText = date;
    }

  } catch (err) {
    console.error(err);
    alert("โหลดข้อมูลไม่สำเร็จ");
  }
}

// ================= LOAD DEPOSITS (ของเดิมคุณ) =================
async function loadDeposits() {
  try {
    if (isLoadingDeposits) return;
    isLoadingDeposits = true;

    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/admin/users/${userId}/deposits`, {
      headers: { Authorization: "Bearer " + token }
    });

    if (!res.ok) throw new Error("โหลด deposit ไม่สำเร็จ");

     const deposits = await res.json();
    const container = document.getElementById("activityContainer");

    container.innerHTML = "";     // 🔥 เพิ่ม
    depositCache.clear();  


    deposits.forEach(d => {

  // 🔥 กันซ้ำ
  if (depositCache.has(d._id)) return;
  depositCache.add(d._id);

  const div = document.createElement("div");

  div.className = "deposit-item px-8 py-5 flex items-center justify-between hover:bg-surface-container transition-colors";

  div.innerHTML = `
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
      </div>

      <div>
        <p class="font-bold">Deposit (${d.method})</p>
        <p class="text-xs text-on-surface-variant">
          ${new Date(d.createdAt).toLocaleString()}
        </p>

        ${
          d.slip
          ? `<p onclick="viewSlip('${d.slip}')" class="text-xs text-yellow-400 cursor-pointer hover:underline">
               View Slip
             </p>`
          : ""
        }
      </div>
    </div>

    <div class="text-right">
      <p class="font-bold text-green-400">+$${d.amount}</p>

      ${
        d.status === "pending"
        ? `
          <div class="flex gap-2 mt-2 justify-end">
            <button onclick="approveDeposit('${d._id}')" class="bg-green-500 px-3 py-1 rounded text-xs">
              Approve
            </button>
            <button onclick="rejectDeposit('${d._id}')" class="bg-red-500 px-3 py-1 rounded text-xs">
              Reject
            </button>
          </div>
        `
        : `
          <span class="text-xs font-bold ${
            d.status === "approved" ? "text-green-400" : "text-red-400"
          }">
            ${d.status.toUpperCase()}
          </span>
        `
      }
    </div>
  `;

  container.appendChild(div);
});

  } catch (err) {
    console.error("LOAD DEPOSIT ERROR:", err);
  } finally {
    isLoadingDeposits = false;
  }
}

// ================= LOAD WITHDRAW (ทำให้เหมือน deposit) =================
async function loadWithdraws() {
  try {
    if (isLoadingWithdraws) return; // 🔥 กันโหลดซ้ำ
    isLoadingWithdraws = true;
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/admin/withdraw/users/${userId}/withdraws`, {
      headers: { Authorization: "Bearer " + token }
    });
    if (!res.ok) throw new Error("โหลด withdraw ไม่สำเร็จ");

    const withdraws = await res.json();
    const container = document.getElementById("activityContainer");

   
    withdrawCache.clear(); // 🔥 เพิ่ม
    withdraws.forEach(w => {

  // 🔥 เพิ่ม 2 บรรทัดนี้
  if (withdrawCache.has(w._id)) return;
  withdrawCache.add(w._id);

  const div = document.createElement("div");

      div.className = "withdraw-item px-8 py-5 flex items-center justify-between hover:bg-surface-container transition-colors";

      div.innerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
            <span class="material-symbols-outlined text-error">outbox</span>
          </div>

          <div>
            <p class="font-bold">Withdrawal (${w.network})</p>
            <p class="text-xs text-on-surface-variant">
              ${new Date(w.createdAt).toLocaleString()}
            </p>

            ${
  w.network === "BANK"
    ? `
      <p class="text-xs text-yellow-400">
        Bank: ${w.bankName || "-"}
      </p>
      <div class="flex items-center gap-2 text-xs text-yellow-400">
  <span>
    Account: ${w.accountNumber || "-"}
  </span>

  <span 
    onclick="copyText('${w.accountNumber}')"
    class="material-symbols-outlined text-primary cursor-pointer hover:scale-110 transition">
    content_copy
  </span>
</div>
      <p class="text-xs text-yellow-400">
        Name: ${w.accountName || "-"}
      </p>
    `
    : `
      <p class="text-xs text-yellow-400 break-all">${w.address}</p>

      <p onclick="copyAddress(this)" data-address="${w.address}"
         class="text-xs text-primary cursor-pointer hover:underline">
         Copy Address
      </p>
    `
}
          </div>
        </div>

        <div class="text-right">
          <p class="font-bold text-red-400">-$${w.amount}</p>

          ${
            w.status === "pending"
            ? `
              <div class="flex gap-2 mt-2 justify-end">
                <button onclick="approveWithdraw('${w._id}')" class="bg-green-500 px-3 py-1 rounded text-xs">
                  Approve
                </button>
                <button onclick="rejectWithdraw('${w._id}')" class="bg-red-500 px-3 py-1 rounded text-xs">
                  Reject
                </button>
              </div>
            `
            : `
              <span class="text-xs font-bold ${
                w.status === "approved" ? "text-green-400" : "text-red-400"
              }">
                ${w.status.toUpperCase()}
              </span>
            `
          }
        </div>
      `;

      container.appendChild(div);
    });

    } catch (err) {
    console.error("LOAD WITHDRAW ERROR:", err);
  } finally {
    isLoadingWithdraws = false; // 🔥 ปลดล็อก
  }
}

function copyText(text) {
  if (!text || text === "-") return;

  navigator.clipboard.writeText(text);
  alert("คัดลอกแล้ว: " + text);
}

// ================= ACTION =================
function copyAddress(el) {
  const address = el.getAttribute("data-address");
  navigator.clipboard.writeText(address);
  alert("คัดลอกแล้ว");
}

async function approveDeposit(id) {
  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/admin/deposit/approve/${id}`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    }
  });

  loadAll(); // 🔥 เพิ่ม
}

async function rejectDeposit(id) {
  const token = localStorage.getItem("token"); // 🔥 เพิ่มบรรทัดนี้

  await fetch(`${API_URL}/api/admin/deposit/${id}/reject`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token // 🔥 เพิ่มส่วนนี้
    }
  });

 loadAll(); 
}

async function approveWithdraw(id) {
  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/admin/withdraw/${id}/approve`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    }
  });

  loadAll();
}


async function rejectWithdraw(id) {
  const token = localStorage.getItem("token");

  await fetch(`${API_URL}/api/admin/withdraw/${id}/reject`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    }
  });

  loadAll();
}

// ================= VIEW SLIP =================
function viewSlip(filename) {
  const modal = document.getElementById("slipModal"); // ✅ ใช้ id ของคุณ
  const img = document.getElementById("slipImage");   // ✅ ใช้ id ของคุณ

  img.src = `${API_URL}/uploads/${filename}`;
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function closeSlip() {
  const modal = document.getElementById("slipModal");

  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// ================= INIT =================
async function loadAll() {
  const container = document.getElementById("activityContainer");

  container.innerHTML = "";
  depositCache.clear();
  withdrawCache.clear();

  await loadDeposits();
  await loadWithdraws();
}

// ================= LOAD KYC =================
async function loadKYC() {
  try {
    const res = await fetch(`${API_URL}/api/kyc/${userId}`, {
  headers: {
    Authorization: "Bearer " + localStorage.getItem("token")
  }
});
    const kyc = await res.json();

    if (!kyc) return;
  
    // ================= PROFILE KYC COLOR =================
const ring = document.getElementById("profileRing");
const badge = document.getElementById("kycBadge");

if (kyc.status === "approved") {
  ring.classList.remove("border-primary/20");
  ring.classList.add("border-green-500");

  badge.classList.remove("bg-primary-container");
  badge.classList.add("bg-green-500", "text-white");

  badge.innerHTML = `
    <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">verified</span>
    VERIFIED
  `;
}

    // ================= STATUS =================
const approveBtn = document.getElementById("approveBtn");

if (kyc.status === "approved") {
  approveBtn.innerText = "Approved ";

  approveBtn.classList.remove("gold-gradient");
  approveBtn.classList.add("bg-green-500", "text-white");

} else if (kyc.status === "pending") {
  approveBtn.innerText = "Approve";
}
    // แสดงชื่อไฟล์
    document.getElementById("kycFront").innerText = kyc.frontImage || "-";
    document.getElementById("kycBack").innerText = kyc.backImage || "-";

// 🔥 เพิ่มตรงนี้
    document.getElementById("kycFront").title = kyc.frontImage || "";
    document.getElementById("kycBack").title = kyc.backImage || "";

    // ปุ่ม view
    // 🔥 VIEW FRONT (Documents)
document.getElementById("viewFront").onclick = () => {
  showDocuments(kyc);
};

// 🔥 VIEW BACK (Personal Details)
document.getElementById("viewBack").onclick = () => {
  showPersonalDetails(kyc);
};

  } catch (err) {
    console.error("KYC LOAD ERROR:", err);
  }
}


function closeKYCModal() {
  const modal = document.getElementById("kycModal");

function showDocuments(kyc) {
  const modal = document.getElementById("kycModal");
  const content = document.getElementById("modalContent");
  const title = document.getElementById("modalTitle");

  title.innerText = "Identity Documents";

  content.innerHTML = `
    <div>
      <p class="text-xs text-gray-400">ID / Passport Number</p>
      <p class="font-bold">${kyc.idNumber || "-"}</p>
    </div>

    <div class="space-y-2">
      <img src="${API_URL}/uploads/${kyc.frontImage}" class="rounded-lg w-full">
      <img src="${API_URL}/uploads/${kyc.backImage}" class="rounded-lg w-full">
    </div>
  `;

  modal.classList.remove("hidden");
  modal.classList.add("flex"); 
}

async function loadUserStats() {
  try {
    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/api/admin/users/${userId}`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.ok) throw new Error("โหลด stats ไม่สำเร็จ");

    const user = await res.json();

    // ✅ Total Deposit
    document.getElementById("totalDeposit").innerText =
      "$" + (user.totalDeposit || 0).toLocaleString();

    // ✅ Withdraw Today
    document.getElementById("withdrawnToday").innerText =
      "$" + (user.withdrawnToday || 0).toLocaleString();

    // ✅ Total Assets (ใช้ balance จริง)
    document.getElementById("totalAssets").innerText =
      "$" + (user.balance || 0).toLocaleString();

  } catch (err) {
    console.error("LOAD USER STATS ERROR:", err);
  }
}
