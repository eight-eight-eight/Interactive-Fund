  class="w-full bg-gold-gradient py-5 rounded-xl text-on-primary font-headline font-extrabold text-base tracking-widest uppercase shadow-xl shadow-primary/10 active:scale-95 transition-transform">
  ถอนเงิน
</button>

<script>

  const API_URL = window.location.origin;

const token = localStorage.getItem("token");

let selectedWallet = null;

// ================= LOAD BALANCE =================
async function loadBalance() {
  try {
    const res = await fetch(`${API_URL}/api/wallet/balance`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    document.querySelector(".text-4xl").innerText =
      "$" + Number(data.balance || 0).toLocaleString();

  } catch (err) {
    console.error("LOAD BALANCE ERROR:", err);
  }
}

// ================= LOAD WALLETS =================
async function loadWallets() {
  try {
    const res = await fetch(`${API_URL}/api/withdraw-wallet`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const wallets = await res.json();
    console.log("WALLETS:", wallets);

    const container = document.getElementById("walletList");
    container.innerHTML = "";

    // ❗ ไม่มี wallet
    if (!wallets || wallets.length === 0) {
      container.innerHTML = `
        <p class="text-center text-on-surface-variant">
          ยังไม่มี Wallet กรุณาเพิ่มก่อน
        </p>
      `;
      return;
    }

    wallets.forEach((w, index) => {
      const div = document.createElement("div");

      div.className = "flex items-center p-4 rounded-xl bg-surface-container cursor-pointer";

      let title = "";
let subtitle = "";

if (w.network === "BANK") {
  title = w.bankName || "Bank Account";
  subtitle = "**** " + (w.accountNumber?.slice(-4) || "----");
} else {
  title = w.network;
  subtitle = w.address?.slice(0,10) + "...";
}

div.innerHTML = `
  <div class="flex-shrink-0 w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center">
    <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
  </div>

  <div class="ml-4 flex-grow">
    <p class="font-label font-semibold text-on-surface">${title}</p>
    <p class="text-xs text-on-surface-variant">${subtitle}</p>
  </div>

  <span id="check-${w._id}" class="material-symbols-outlined text-primary hidden">
    check_circle
  </span>
`;

      // click select
      div.onclick = () => {
        selectedWallet = w;
        highlightSelected(w._id);
      };

      container.appendChild(div);

      // auto select ตัวแรก
      if (index === 0) {
        selectedWallet = w;

        // delay ให้ DOM render ก่อน (สำคัญมาก)
        setTimeout(() => {
          highlightSelected(w._id);
        }, 50);
      }
    });

  } catch (err) {
    console.error("LOAD WALLET ERROR:", err);
  }
}

// ================= SELECT =================
function highlightSelected(id) {
  document.querySelectorAll("[id^='check-']").forEach(el => {
    el.classList.add("hidden");
  });

  const el = document.getElementById("check-" + id);

  if (el) {
    el.classList.remove("hidden");
  } else {
    console.warn("ไม่เจอ element check-" + id);
  }
}

// ================= SUBMIT =================
async function confirmWithdraw() {
  const btn = document.getElementById("withdrawBtn");

  const amount = Number(document.getElementById("withdrawAmount").value);

  if (!selectedWallet) {
    alert("กรุณาเลือก Wallet ก่อน");
    return;
  }

  const address = selectedWallet.address;
  const network = selectedWallet.network;
  const isBank = network === "BANK";

  if (isBank) {
  if (!selectedWallet.accountNumber) {
    alert("ไม่มีเลขบัญชี");
    return;
  }
} else {
  if (!selectedWallet.address) {
    alert("ไม่มี address");
    return;
  }
}

  if (!amount || amount <= 0) {
    alert("กรอกจำนวนเงินให้ถูกต้อง");
    return;
  }

  try {
    btn.disabled = true;
    btn.innerText = "Processing...";

    const res = await fetch(`${API_URL}/api/withdraw/create`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
  amount,
  network: selectedWallet.network,

  // 🔥 crypto
  address: selectedWallet.address || "",

  // 🔥 bank (สำคัญ)
  bankName: selectedWallet.bankName || "",
  accountNumber: selectedWallet.accountNumber || "",
  accountName: selectedWallet.accountName || ""
})
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "ถอนเงินไม่สำเร็จ");
      btn.disabled = false;
      btn.innerText = "Request Withdrawal";
      return;
    }

    // ❌ ปิด modal ก่อน
document.getElementById("withdrawModal").classList.add("hidden");

// ✅ แสดงแจ้งเตือนสีเขียว
const box = document.getElementById("withdrawSuccess");
box.classList.remove("hidden");

// ⏱ แสดง 2 วินาที แล้วค่อยเปลี่ยนหน้า
setTimeout(() => {
  box.classList.add("hidden");
  window.location.href = "wallet.html";
}, 2000);

  } catch (err) {
    console.error("WITHDRAW ERROR:", err);
    alert("เกิดข้อผิดพลาด");

    btn.disabled = false;
    btn.innerText = "Request Withdrawal";
  }
}

if(!token){
  window.location.href = "login.html";
}

// ================= MAX =================
function setMaxAmount() {
  const balanceText = document.querySelector(".text-4xl")?.innerText || "0";
  const balance = Number(balanceText.replace(/[^0-9.]/g, ""));
  document.getElementById("withdrawAmount").value = balance;
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  loadBalance();
  loadWallets();

document.getElementById("withdrawBtn")
  .addEventListener("click", openWithdrawModal);
});


function openWithdrawModal() {
  const amount = Number(document.getElementById("withdrawAmount").value);

  if (!selectedWallet) {
    alert("กรุณาเลือก Wallet ก่อน");
    return;
  }

  if (!amount || amount <= 0) {
    alert("กรอกจำนวนเงิน");
    return;
  }

  // ใส่ข้อมูล
  document.getElementById("wAmount").innerText =
    "$" + amount.toLocaleString();

  const walletText = selectedWallet.network === "BANK"
    ? selectedWallet.accountNumber
    : selectedWallet.address;

  document.getElementById("wWallet").innerText = walletText;

  document.getElementById("withdrawModal").classList.remove("hidden");
}

function closeWithdrawModal(){
  document.getElementById("withdrawModal").classList.add("hidden");
}
</script>
