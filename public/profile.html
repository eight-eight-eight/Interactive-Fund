<script>

  const API_URL = window.location.origin;
async function loadProfile() {
  try {
    const token = localStorage.getItem('token');

    const res = await fetch(`${API_URL}/api/user/profile`, {
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    const data = await res.json();

    // 👤 Username
    document.getElementById('username').innerText = data.username;

    // 🆔 Vault ID
    document.getElementById('vaultId').innerText = "Vault ID: " + data.vaultId;

    // 📅 Member Since
    const date = new Date(data.createdAt);
    const options = { year: 'numeric', month: 'short' };
    document.getElementById('memberSince').innerText =
      date.toLocaleDateString('en-US', options);

    // 💰 Portfolio → แปลงเป็นทอง
    const goldRate = 0.00035;
    const gold = data.balance * goldRate;

    document.getElementById('portfolioValue').innerText =
      gold.toFixed(2) + " oz";

      // ================= KYC STATUS =================
const ring = document.getElementById("profileRing");
const badge = document.getElementById("kycBadge");

const status = data.kyc?.status || "none";

if (status === "approved") {
  ring.className = "w-28 h-28 rounded-full p-1 bg-green-500";

  badge.className = "absolute -bottom-1 right-1 bg-green-500 text-white text-[10px] font-bold px-3 py-1 rounded-full border-2 border-surface flex items-center gap-1";

  badge.innerHTML = `
    <span class="material-symbols-outlined text-[12px]" style="font-variation-settings:'FILL' 1;">verified</span>
    Verified
  `;

} else if (status === "pending") {
  ring.className = "w-28 h-28 rounded-full p-1 bg-yellow-500";

  badge.className = "absolute -bottom-1 right-1 bg-yellow-500 text-black text-[10px] font-bold px-3 py-1 rounded-full border-2 border-surface flex items-center gap-1";

  badge.innerHTML = `
    <span class="material-symbols-outlined text-[12px]">hourglass_top</span>
    Pending
  `;

} else {
  ring.className = "w-28 h-28 rounded-full p-1 bg-gray-500";

  badge.className = "absolute -bottom-1 right-1 bg-gray-500 text-white text-[10px] font-bold px-3 py-1 rounded-full border-2 border-surface flex items-center gap-1";

  badge.innerHTML = `
    <span class="material-symbols-outlined text-[12px]">error</span>
    Unverified
  `;
}

  } catch (err) {
    console.error("Profile load error:", err);
  }
}

function copyVaultId() {
  const text = document.getElementById("vaultId").innerText;
  const id = text.replace("Vault ID: ", "");

  navigator.clipboard.writeText(id);

  const msg = document.createElement("div");
  msg.innerText = "Copied!";
  msg.className = "fixed top-5 right-5 bg-primary text-black px-4 py-2 rounded-lg";

  document.body.appendChild(msg);

  setTimeout(() => msg.remove(), 1500);
}




function goToNotifications() {
  window.location.href = "notifications.html";
}

async function checkNotifications() {
  try {
    const res = await fetch(`${API_URL}/api/notifications`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    // 🔥 เช็ค unread
    const hasUnread = data.some(n => !n.isRead);

    const dot = document.getElementById("notifDot");

    if (dot) {
      if (hasUnread) {
  dot.classList.remove("hidden");
} else {
  dot.classList.add("hidden");
}
    }

  } catch (err) {
    console.error("NOTIF ERROR:", err);
  }
}

function goToKYC() {
  window.location.href = "kyc-form.html";
}
function goToPaymentMethods() {
  window.location.href = "wallet-methods.html";
}
function goToPrivacy() {
  window.location.href = "privacy-policy.html";
}
function goToChat() {
  window.location.href = "chat.html";
}

 

const logoutBtn = document.getElementById("logoutBtn");
if (logoutBtn) {
  logoutBtn.addEventListener("click", openLogoutModal);
}


function openLogoutModal(){
  document.getElementById("logoutModal").classList.remove("hidden");
}

function closeLogoutModal(){
  document.getElementById("logoutModal").classList.add("hidden");
}

function confirmLogout(){
  // ลบข้อมูล
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  localStorage.removeItem("userId");

  sessionStorage.clear();

  // ไป login
  window.location.href = "login.html";
}

// 🔥 Active Bottom Nav
(function(){

  const path = window.location.pathname.split("/").pop();

  document.querySelectorAll(".nav-link").forEach(link => {

    const href = link.getAttribute("href");

    if(path === href){

      link.classList.add("active");

    }

  });

})();


let interval;

document.addEventListener("DOMContentLoaded", () => {

  loadProfile();
  checkNotifications();

  interval = setInterval(() => {
    loadProfile();
    checkNotifications();
  }, 1000);

});


window.addEventListener("beforeunload", () => {
  clearInterval(interval);
});

window.addEventListener("focus", () => {
  loadProfile();
  checkNotifications();
});
</script>
