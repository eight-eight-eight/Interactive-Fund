  <div class="bg-surface-container p-6 rounded-xl w-[400px] space-y-4">

    <h2 class="text-lg font-bold">Add Wallet</h2>

    <select id="type" class="w-full p-2 bg-black rounded">
      <option value="crypto">Crypto</option>
      <option value="bank">Bank</option>
    </select>

    <input id="network" placeholder="Network (ERC20, BTC)" class="w-full p-2 bg-black rounded"/>
    <input id="address" placeholder="Wallet Address" class="w-full p-2 bg-black rounded"/>

    <input id="bankName" placeholder="Bank Name" class="w-full p-2 bg-black rounded"/>
    <input id="accountNumber" placeholder="Account Number" class="w-full p-2 bg-black rounded"/>
    <input id="accountName" placeholder="Account Name" class="w-full p-2 bg-black rounded"/>

    <div class="flex gap-2">
      <button onclick="submitWallet()" class="bg-yellow-500 px-4 py-2 rounded">Save</button>
      <button onclick="closeModal()" class="bg-gray-500 px-4 py-2 rounded">Cancel</button>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Access denied");
  window.location.href = "login.html";
}

async function checkAdmin() {
  try {
    const res = await fetch("/api/user/profile", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const user = await res.json();

    if (user.role !== "admin") {
      alert("Admin only");
      window.location.href = "profile.html";
    }

  } catch (err) {
    alert("Access error");
    window.location.href = "login.html";
  }
}

checkAdmin();

async function submitWallet() {
  const type = document.getElementById("type").value;

  let data = { type };

  if (type === "crypto") {
    data.network = document.getElementById("network").value;
    data.address = document.getElementById("address").value;
  } else {
    data.bankName = document.getElementById("bankName").value;
    data.accountNumber = document.getElementById("accountNumber").value;
    data.accountName = document.getElementById("accountName").value;
  }

  const token = localStorage.getItem("token"); // 🔥 เพิ่มบรรทัดนี้

  const res = await fetch("/api/admin/wallet-info/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token // 🔥 สำคัญมาก
    },
    body: JSON.stringify(data)
  });

  if (!res.ok) {
    const err = await res.json();
    console.error(err);
    alert(err.message || "บันทึกไม่สำเร็จ");
    return;
  }

  alert("บันทึกสำเร็จ");

  closeModal();
  loadWallets(); // 🔥 โหลดใหม่
}

async function loadWallets() {
  const token = localStorage.getItem("token");

  const res = await fetch("/api/admin/wallet-info", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const data = await res.json();

  // 🔥 กันพัง
  if (!Array.isArray(data)) {
    console.error("wallet error:", data);
    alert("โหลด wallet ไม่สำเร็จ");
    return;
  }


  // ===== Desktop Table =====
  let tableHTML = "";

  data.forEach(w => {
    tableHTML += `
      <tr class="hover:bg-surface-container-high/50">
        <td class="px-6 py-5">${w.type}</td>
        <td class="px-6 py-5">${w.network || w.bankName}</td>
        <td class="px-6 py-5 break-all">${w.address || w.accountNumber}</td>
        <td class="px-6 py-5 text-green-400 font-bold">ACTIVE</td>
        <td class="px-6 py-5 text-right">
          <button onclick="deleteWallet('${w._id}')"
            class="text-red-400 hover:text-red-600 font-bold">
            Delete
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("walletTable").innerHTML = tableHTML;


  // ===== Mobile Card =====
  let mobileHTML = "";

  data.forEach(w => {
    mobileHTML += `
      <div class="bg-surface-container p-4 rounded-xl border border-outline-variant/10">

        <div class="flex justify-between items-start mb-2">
          <span class="text-xs text-on-surface-variant uppercase">${w.type}</span>
          <span class="text-green-400 text-xs font-bold">ACTIVE</span>
        </div>

        <div class="mb-2">
          <p class="text-sm text-on-surface-variant">Name / Network</p>
          <p class="font-bold">${w.network || w.bankName}</p>
        </div>

        <div class="mb-3">
          <p class="text-sm text-on-surface-variant">Identifier</p>
          <p class="break-all text-xs">${w.address || w.accountNumber}</p>
        </div>

        <div class="flex gap-2">
          <button onclick="deleteWallet('${w._id}')"
            class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-sm font-bold">
            Delete
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("walletMobile").innerHTML = mobileHTML;
}

// โหลดตอนเปิดหน้า
loadWallets();

async function deleteWallet(id) {
  if (!confirm("ลบรายการนี้?")) return;

  const token = localStorage.getItem("token"); // 🔥 เพิ่ม

  try {
    const res = await fetch(`/api/admin/wallet-info/${id}`, {
      method: "DELETE",
      headers: {
        Authorization: "Bearer " + token // 🔥 ต้องมี
      }
    });

    if (!res.ok) {
      const err = await res.json();
      console.error(err);
      alert(err.message || "ลบไม่สำเร็จ");
      return;
    }

    alert("ลบสำเร็จ");
    loadWallets();

  } catch (err) {
    console.error(err);
    alert("เกิดข้อผิดพลาด");
  }
}


function openModal() {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}
</script>
