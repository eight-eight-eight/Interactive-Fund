<style>
        .glass-panel {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(20px);
        }
        .metallic-gradient {
            background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Top AppBar -->
<header class="w-full top-0 sticky z-40 bg-[#131313] dark:bg-[#131313]">
<div class="flex justify-between items-center px-8 h-16 w-full">
<div class="flex items-center gap-4">
<button onclick="goBack()">
  <span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#f2ca50]" style="">Manage Vault</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-[#f2ca50] hover:bg-[#201f1f] transition-colors duration-200 p-2 rounded-full active:scale-95" style="">
<span class="material-symbols-outlined" style="">more_vert</span>
</button>
</div>
</div>
<div class="bg-[#1c1b1b] h-[1px] w-full"></div>
</header>
<main class="max-w-2xl mx-auto px-8 pt-8 pb-32">
<!-- Financial Data Management Bento Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Current Balance Card -->
<div class="bg-surface-container p-6 rounded-xl relative overflow-hidden group">
<div class="flex justify-between items-start mb-4">
<div>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant" style=""><p data-pm-slice="1 1 []">balance</p></span>
<div class="flex items-baseline gap-2 mt-1">
<span class="font-headline font-bold text-3xl text-primary" style="">Wallet</span>
<span class="text-on-surface-variant font-medium text-sm" style=""><br></span>
</div>
</div>
<button class="p-2 rounded-lg bg-surface-container-high hover:bg-surface-container-highest text-primary transition-all duration-200" style="">
<span class="material-symbols-outlined" style="">edit</span>
</button>
</div>
<div class="mt-4 space-y-4">
<div class="relative">
<label class="sr-only" for="balance" style="">Edit Current Balance</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-5 text-on-surface placeholder-on-surface-variant/30 focus:ring-1 focus:ring-primary/50 transition-all font-headline font-semibold text-lg" id="balance" placeholder="0.00" type="text">
<span class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant font-label text-sm" style="">USD</span>
</div>
</div>
</div>
<!-- Total Deposit Card -->
<div class="bg-surface-container p-6 rounded-xl">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="">account_balance</span>
</div>
<span class="font-label font-semibold text-on-surface" style="">Total Deposit</span>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors" style="">
<span class="material-symbols-outlined" style="">edit</span>
</button>
</div>
<div class="relative">
<input id="totalDeposit" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-5 text-on-surface focus:ring-1 focus:ring-primary/50 font-headline font-semibold text-lg" type="text">
<div class="absolute left-0 bottom-0 h-0.5 w-0 bg-primary group-focus-within:w-full transition-all duration-500"></div>
</div>
</div>
<!-- Withdrawn Today Card -->
<div class="bg-surface-container p-6 rounded-xl">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="">payments</span>
</div>
<span class="font-label font-semibold text-on-surface" style="">Withdrawn Today</span>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors" style="">
<span class="material-symbols-outlined" style="">edit</span>
</button>
</div>
<div class="relative">
<input id="withdrawnToday" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-5 text-on-surface focus:ring-1 focus:ring-primary/50 font-headline font-semibold text-lg" type="text">
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 space-y-4">
<button onclick="updateWallet()" class="w-full metallic-gradient py-5 rounded-xl text-on-primary font-headline font-bold text-lg tracking-wide shadow-xl shadow-primary/10 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="">check_circle</span>
                Update All Records
            </button>
<button class="w-full py-4 text-on-surface-variant font-label font-medium hover:text-on-surface transition-colors flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined text-sm" style="">close</span>
                Cancel Changes
            </button>
</div>
</main>
<script>
const API_URL = window.location.origin;

const token = localStorage.getItem("token");

if (!token) {
  alert("Access denied");
  window.location.href = "login.html";
}

async function checkAdmin() {
  try {
    const res = await fetch("/api/user/profile", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const user = await res.json();

    if (user.role !== "admin") {
      alert("Admin only");
      window.location.href = "profile.html";
    }

  } catch (err) {
    alert("Access error");
    window.location.href = "login.html";
  }
}

checkAdmin();

const API = `${API_URL}/api/admin/users`;

// 👉 ดึง userId จาก URL
function getUserId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

// 🟢 โหลดข้อมูล
async function loadUser() {
  try {
    const userId = getUserId();
    const token = localStorage.getItem("token");

    const res = await fetch(`${API}/${userId}`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.ok) throw new Error("โหลด user ไม่สำเร็จ");

    const user = await res.json();

    document.getElementById("balance").value = user.balance || 0;
    document.getElementById("totalDeposit").value = user.totalDeposit || 0;
    document.getElementById("withdrawnToday").value = user.withdrawnToday || 0;

  } catch (err) {
    console.error("LOAD USER ERROR:", err);
    alert("โหลดข้อมูลไม่สำเร็จ");
  }
}

// 🔥 อัปเดตข้อมูล
async function updateWallet() {
  const userId = getUserId();
  const token = localStorage.getItem("token");

  const balance = Number(document.getElementById("balance").value);
  const totalDeposit = Number(document.getElementById("totalDeposit").value);
  const withdrawnToday = Number(document.getElementById("withdrawnToday").value);

  try {
    const res = await fetch(`${API}/update-wallet/${userId}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        balance,
        totalDeposit,
        withdrawnToday
      })
    });

    if (!res.ok) throw new Error("อัปเดตไม่สำเร็จ");

    alert("อัปเดตสำเร็จ");

  } catch (err) {
    console.error("UPDATE ERROR:", err);
    alert("เกิดข้อผิดพลาด");
  }
}

function goBack() {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("id");

  if (!userId) {
    alert("User ID not found");
    return;
  }

  window.location.href = `admin-user-detail.html?id=${userId}`;
}
// โหลดตอนเข้า
document.addEventListener("DOMContentLoaded", loadUser);
</script>
</body></html>
