<!-- Decorative Illustration -->

<span class="material-symbols-outlined text-4xl text-on-surface-variant" data-icon="notifications_none">notifications_none</span>
</div>
<p class="font-body text-xs text-on-surface-variant">Stay informed on your digital bullion status and vault security events.</p>
</div>
</main>

<script>
const API_URL = window.location.origin;
const API = `${API_URL}/api/notifications`;

function formatThaiMessage(n){

  const amount = n.message.match(/\$[\d,]+/)?.[0] || "$0";

  if (n.type === "TRANSACTION") {

    if (n.transactionType === "DEPOSIT") {
      return `
        <span class="text-gray-400">ฝากเงินจำนวน </span>
        <span class="text-green-400 font-bold">${amount}</span>
        <span class="text-gray-400"> สำเร็จ</span>
      `;
    } else {
      return `
        <span class="text-gray-400">ถอนเงินจำนวน </span>
        <span class="text-red-400 font-bold">${amount}</span>
        <span class="text-gray-400"> สำเร็จ</span>
      `;
    }
  }

  return `<span class="text-gray-300">${n.message}</span>`;
}

async function loadNotifications() {
  try {
    const res = await fetch(API, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    const container = document.getElementById("notificationList");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p class='text-center text-gray-400'>No notifications</p>";
      return;
    }

    data.forEach(n => {
      container.innerHTML += `
        <div class="bg-surface-container rounded-xl p-5">
          <div class="flex gap-4">
            <div>
              <span class="material-symbols-outlined text-2xl ${getColor(n)}">
               ${getIcon(n)}
                </span>
            </div>
            <div class="flex-grow">
              <div class="flex justify-between">
                <h3 class="font-bold">
                   ${n.title}
                 </h3>
                <span class="text-xs text-gray-400">${formatTime(n.createdAt)}</span>
              </div>
              <p class="text-sm">
                  ${formatThaiMessage(n)}
               </p>
            </div>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

// 🔥 mark read
async function markRead() {
  await fetch(API + "/read-all", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });
}

// icon auto
function getIcon(n) {
  if (n.type === "TRANSACTION") {
    if (n.transactionType === "DEPOSIT") return "south_west";
    return "north_east";
  }

  if (n.type === "SYSTEM") return "terminal";
  if (n.type === "PROMOTION") return "auto_awesome";
  if (n.type === "SECURITY") return "verified_user";

  return "notifications";
}

function getColor(n) {
  if (n.type === "TRANSACTION") {
    if (n.transactionType === "DEPOSIT") return "text-green-400";
    return "text-red-400";
  }

  if (n.type === "SYSTEM") return "text-yellow-400";
  if (n.type === "PROMOTION") return "text-purple-400";
  if (n.type === "SECURITY") return "text-blue-400";

  return "text-gray-400";
}
// เวลา
function formatTime(date) {
  const d = new Date(date);
  return d.toLocaleString();
}

async function markAsRead() {
  try {
    await fetch(`${API_URL}/api/notifications/read-all`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
  } catch (err) {
    console.error("MARK READ ERROR:", err);
  }
}

// 🔥 โหลดตอนเข้า + mark read
document.addEventListener("DOMContentLoaded", async () => {

  await markAsRead();        // 🔥 mark ก่อน
  await loadNotifications(); // 🔥 แล้วค่อยโหลด

});
</script>
