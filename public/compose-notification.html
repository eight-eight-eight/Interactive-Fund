<body class="min-h-screen pb-24 overflow-x-hidden">
<!-- TopAppBar -->
<nav class="bg-[#131313] dark:bg-stone-950 docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-8 py-4">
<div class="flex items-center gap-4">

<main class="max-w-3xl mx-auto px-6 py-10 space-y-12">
<!-- Notification Type Selection -->

<div class="flex items-center justify-between">
<h2 class="font-headline text-on-surface font-bold text-xl tracking-tight">Priority &amp; Category</h2>

</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<!-- Transaction -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="type" type="radio"/>
<div class="h-full p-4 rounded-xl bg-surface-container border border-outline-variant/10 peer-checked:border-primary/50 peer-checked:bg-surface-container-high transition-all flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary transition-colors" data-icon="account_balance">account_balance</span>
<span class="font-label text-xs font-semibold text-on-surface-variant peer-checked:text-on-surface uppercase tracking-tight">ถอนเงิน</span>
</div>
</label>
<!-- System Alert -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="type" type="radio"/>
<div class="h-full p-4 rounded-xl bg-surface-container border border-outline-variant/10 peer-checked:border-primary/50 peer-checked:bg-surface-container-high transition-all flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary transition-colors" data-icon="terminal">terminal</span>
<span class="font-label text-xs font-semibold text-on-surface-variant peer-checked:text-on-surface uppercase tracking-tight">ระบบ</span>
</div>
</label>
<!-- Promotion -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="type" type="radio"/>
<div class="h-full p-4 rounded-xl bg-surface-container border border-outline-variant/10 peer-checked:border-primary/50 peer-checked:bg-surface-container-high transition-all flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary transition-colors" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label text-xs font-semibold text-on-surface-variant peer-checked:text-on-surface uppercase tracking-tight">โปรโมชั่น</span>
</div>
</label>
<!-- Security -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="type" type="radio"/>
<div class="h-full p-4 rounded-xl bg-surface-container border border-outline-variant/10 peer-checked:border-primary/50 peer-checked:bg-surface-container-high transition-all flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary transition-colors" data-icon="verified_user">verified_user</span>
<span class="font-label text-xs font-semibold text-on-surface-variant peer-checked:text-on-surface uppercase tracking-tight">ความปลอดภัย</span>
</div>
</label>
</div>
</section>
<!-- Content Editor -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<h2 class="font-headline text-on-surface font-bold text-xl tracking-tight">Message Ledger</h2>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant/50">Step 03</span>
</div>
<div class="space-y-4">
<!-- Title -->
<div class="bg-surface-container rounded-xl p-1 border border-outline-variant/10 focus-within:border-primary/30 transition-colors">
<input id="notifTitle" class="w-full bg-transparent border-none py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 font-headline font-bold text-lg focus:ring-0" placeholder="Notification Headline" type="text"/>
</div>
<!-- Body -->
<div class="bg-surface-container rounded-xl p-1 border border-outline-variant/10 focus-within:border-primary/30 transition-colors">
<textarea id="notifMessage" class="w-full bg-transparent border-none py-4 px-5 text-on-surface-variant placeholder:text-on-surface-variant/30 font-body text-base focus:ring-0 resize-none" placeholder="Compose your detailed announcement here. Use the Sovereign voice: authoritative, secure, and clear." rows="6"></textarea>
</div>

</main>
<script>
const API_URL = window.location.origin;

const token = localStorage.getItem("token");

if (!token) {
  alert("Access denied");
  window.location.href = "login.html";
}

async function checkAdmin() {
  try {
    const res = await fetch("/api/user/profile", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const user = await res.json();

    if (user.role !== "admin") {
      alert("Admin only");
      window.location.href = "profile.html";
    }

  } catch (err) {
    alert("Access error");
    window.location.href = "login.html";
  }
}

checkAdmin();

// 🔙 back
function goBack() {
  window.history.back();
}

// 🔎 get user id
function getUserIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

// 🎯 get selected type
function getSelectedType() {
  const radios = document.querySelectorAll("input[name='type']");
  const labels = ["TRANSACTION", "SYSTEM", "PROMOTION", "SECURITY"];

  let selectedIndex = 0;

  radios.forEach((r, i) => {
    if (r.checked) selectedIndex = i;
  });

  return labels[selectedIndex];
}

// 🚀 SEND NOTIFICATION
async function sendNotification() {
  const title = document.getElementById("notifTitle").value.trim();
  const message = document.getElementById("notifMessage").value.trim();

  const userId = getUserIdFromURL();
  const token = localStorage.getItem("token");
  const type = getSelectedType();

  // 🔒 validate
  if (!title || !message) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  if (!userId) {
    alert("ไม่พบ userId");
    return;
  }

  if (!token) {
    alert("Token หมดอายุ กรุณา login ใหม่");
    return;
  }

  try {
    console.log("📤 SEND NOTIFICATION:", {
      userId,
      title,
      message,
      type
    });

    const res = await fetch(`${API_URL}/api/notifications/send`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        userId,
        title,
        message,
        type // 🔥 ตัวสำคัญ
      })
    });

    // 🔥 เช็ค status จริง (ของเดิมมึงไม่เช็ค)
    if (!res.ok) {
      const errText = await res.text();
      console.error("❌ SERVER ERROR:", errText);
      alert("ส่งไม่สำเร็จ (server error)");
      return;
    }

    const data = await res.json();

    console.log("✅ SUCCESS:", data);

    alert("ส่งแจ้งเตือนสำเร็จ");

    // 🔥 กลับหน้าเดิม
    window.history.back();

  } catch (err) {
    console.error("❌ FETCH ERROR:", err);
    alert("ส่งไม่สำเร็จ (network error)");
  }
}
</script>
